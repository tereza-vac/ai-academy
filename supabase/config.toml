# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "ai-academy"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed/*.sql"]

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = ["http://localhost:8080"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[edge_runtime.secrets]
OPENAI_API_KEY = "env(OPENAI_API_KEY)"
RSS_USER_AGENT = "env(RSS_USER_AGENT)"
PAPERS_SEARCH_USER_AGENT = "env(PAPERS_SEARCH_USER_AGENT)"

# Public endpoints (no auth required) — fine for a small internal MVP.
[functions.radar-ingest]
verify_jwt = false

[functions.ai-enrich]
verify_jwt = false

# Scholar-like search. JWT verification is left off so the function is callable
# from the browser with just the publishable key; the client still attaches the
# user's access token for future per-user rate-limiting. Flip to `true` once
# you add a per-user quota in code.
[functions.papers-search]
verify_jwt = false
