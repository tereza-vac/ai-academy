name: Models ingest

# Daily refresh of the LLM catalog (OpenRouter + Hugging Face).
# Alternative to pg_cron in supabase/migrations/20260101000020_models_cron.sql.

on:
  schedule:
    - cron: '42 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: models-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST models-ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY must be set as repo secrets" >&2
            exit 1
          fi
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" -X POST \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            "$SUPABASE_URL/functions/v1/models-ingest")
          echo "HTTP $status"
          cat "$response"
          test "$status" -lt 300
