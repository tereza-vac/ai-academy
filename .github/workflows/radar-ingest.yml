name: Radar ingest

# Hourly poll of every active row in public.rss_sources.
# Use this when you don't want pg_cron + pg_net inside Supabase
# (e.g. simpler ops, easier debugging via GitHub Actions logs).
# Free tier easily covers 24 calls/day.

on:
  schedule:
    # 17 past every hour (cron syntax is UTC on GitHub).
    - cron: '17 * * * *'
  workflow_dispatch: {}

concurrency:
  group: radar-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST radar-ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY must be set as repo secrets" >&2
            exit 1
          fi
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" -X POST \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            "$SUPABASE_URL/functions/v1/radar-ingest")
          echo "HTTP $status"
          cat "$response"
          test "$status" -lt 300
